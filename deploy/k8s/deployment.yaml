apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-u
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-u
  template:
    metadata:
      labels:
        app: nexus-u
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nexus-u
          image: ghcr.io/OWNER/nexus-u:2.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: artifacts
          emptyDir: {}
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-u
spec:
  selector:
    app: nexus-u
  ports:
    - port: 80
      targetPort: 8080
