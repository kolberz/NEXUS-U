name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m pytest -q -m reality
      - run: python -m compileall -q src tests

  lean_kernel:
    name: Lean kernel verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Generate the pinned replay project
        run: python -c "from pathlib import Path; from nexus_u.formalization.kernel_bridge import KernelBridgeEngine; KernelBridgeEngine.write_project(Path('benchmark-results/kernel-bridge'))"
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: benchmark-results/kernel-bridge

  release:
    name: Release gate
    needs: [test, lean_kernel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e ".[dev]"
      - run: nexus-u validate examples/hello_python.json
      - run: nexus-u capabilities
      - run: nexus-u validate examples/discovery.json
      - run: nexus-u run examples/discovery.json --output artifacts
      - run: nexus-u run examples/hello_python.json --output artifacts
      - run: nexus-u run examples/obligation_aware.json --output artifacts
      - run: nexus-u verify-obligations "$(ls -t artifacts/*.obligations.json | head -1)"
      - run: nexus-u reality-benchmark --builtin --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u routing-benchmark --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u federation-benchmark --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u tension-benchmark --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u discovery-trials --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u independent-challenge --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u preregistered-reproduction --output benchmark-results/reproduction
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u lower-bound-lab --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u lower-bound-search --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: nexus-u formalized-lower-bound --output benchmark-results
        env:
          NEXUS_U_SIGNING_KEY: ci-ephemeral-reality-key
      - run: python -m build
      - run: python scripts/release_gate.py
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-u-dist
          path: |
            dist/
            artifacts/
            benchmark-results/
