name: Native kernel recovery CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install . pytest
      - run: pytest
      - run: nexus-u nexus-kernel-benchmark --output benchmark-results
      - run: nexus-u kernel-check benchmark-results/nexus-kernel-proof.json
